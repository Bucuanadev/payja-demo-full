<!DOCTYPE html>
<html lang="pt-MZ">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SMS - PayJA Simulador</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .page-header {
            max-width: 900px;
            margin: 0 auto 20px;
            display: flex;
            align-items: center;
            gap: 15px;
        }
        .back-btn {
            background: rgba(255,255,255,0.2);
            border: none;
            color: #fff;
            padding: 10px 18px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: background 0.2s;
        }
        .back-btn:hover { background: rgba(255,255,255,0.3); }
        .page-title { color: #fff; font-size: 24px; font-weight: 700; }
        .page-subtitle { color: rgba(255,255,255,0.8); font-size: 14px; }
        .container { max-width: 900px; margin: 0 auto; }
        .card {
            background: #fff;
            border-radius: 16px;
            padding: 24px;
            margin-bottom: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.15);
        }
        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 2px solid #f0f0f0;
        }
        .card-title { font-size: 18px; font-weight: 700; color: #1c1c1e; }
        .badge {
            background: #667eea;
            color: #fff;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
        }
        .filter-bar {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        .filter-btn {
            padding: 8px 16px;
            border: 2px solid #e0e0e0;
            border-radius: 20px;
            background: #fff;
            cursor: pointer;
            font-size: 13px;
            font-weight: 600;
            color: #666;
            transition: all 0.2s;
        }
        .filter-btn.active, .filter-btn:hover {
            background: #667eea;
            border-color: #667eea;
            color: #fff;
        }
        .search-input {
            flex: 1;
            min-width: 200px;
            padding: 8px 16px;
            border: 2px solid #e0e0e0;
            border-radius: 20px;
            font-size: 13px;
            outline: none;
        }
        .search-input:focus { border-color: #667eea; }
        .sms-list { display: flex; flex-direction: column; gap: 12px; }
        .sms-item {
            background: #f8f9ff;
            border-radius: 12px;
            padding: 16px;
            border-left: 4px solid #667eea;
            transition: transform 0.1s;
            cursor: default;
        }
        .sms-item:hover { transform: translateX(4px); }
        .sms-item.ELIGIBILITY { border-left-color: #10b981; background: #f0fdf4; }
        .sms-item.INELIGIBILITY { border-left-color: #ef4444; background: #fef2f2; }
        .sms-item.LOAN_APPROVED { border-left-color: #10b981; background: #f0fdf4; }
        .sms-item.LOAN_FAILED { border-left-color: #f59e0b; background: #fffbeb; }
        .sms-item.LOAN_PROCESSING { border-left-color: #3b82f6; background: #eff6ff; }
        .sms-item.DOCUMENT { border-left-color: #f59e0b; background: #fffbeb; }
        .sms-item.MANUAL { border-left-color: #8b5cf6; background: #faf5ff; }
        .sms-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 8px;
        }
        .sms-meta { display: flex; align-items: center; gap: 10px; }
        .sms-type-badge {
            font-size: 11px;
            font-weight: 700;
            padding: 3px 8px;
            border-radius: 6px;
            background: #667eea;
            color: #fff;
        }
        .sms-type-badge.ELIGIBILITY { background: #10b981; }
        .sms-type-badge.INELIGIBILITY { background: #ef4444; }
        .sms-type-badge.LOAN_APPROVED { background: #10b981; }
        .sms-type-badge.LOAN_FAILED { background: #f59e0b; color: #1c1c1e; }
        .sms-type-badge.LOAN_PROCESSING { background: #3b82f6; }
        .sms-type-badge.DOCUMENT { background: #f59e0b; color: #1c1c1e; }
        .sms-phone { font-size: 13px; font-weight: 600; color: #1c1c1e; }
        .sms-time { font-size: 12px; color: #999; white-space: nowrap; }
        .sms-message {
            font-size: 14px;
            color: #333;
            line-height: 1.6;
            white-space: pre-wrap;
        }
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #999;
        }
        .empty-state i { font-size: 48px; margin-bottom: 16px; color: #ddd; }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 15px;
            margin-bottom: 20px;
        }
        .stat-card {
            background: #f8f9ff;
            border-radius: 12px;
            padding: 16px;
            text-align: center;
        }
        .stat-number { font-size: 28px; font-weight: 700; color: #667eea; }
        .stat-label { font-size: 12px; color: #999; margin-top: 4px; }
        .action-bar {
            display: flex;
            gap: 10px;
            justify-content: flex-end;
            margin-bottom: 15px;
        }
        .btn {
            padding: 8px 16px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 6px;
            transition: all 0.2s;
        }
        .btn-primary { background: #667eea; color: #fff; }
        .btn-primary:hover { background: #5568d3; }
        .btn-danger { background: #fee2e2; color: #ef4444; }
        .btn-danger:hover { background: #fecaca; }
        .btn-secondary { background: #f0f0f0; color: #666; }
        .btn-secondary:hover { background: #e0e0e0; }
        .loading { text-align: center; padding: 40px; color: #999; }
        .loading i { animation: spin 1s linear infinite; }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="page-header">
        <button class="back-btn" onclick="window.location.href='/'">
            <i class="fas fa-arrow-left"></i> Voltar
        </button>
        <div>
            <div class="page-title"><i class="fas fa-sms"></i> Caixa de SMS</div>
            <div class="page-subtitle">Histórico de mensagens enviadas pelo PayJA</div>
        </div>
    </div>

    <div class="container">
        <!-- Estatísticas -->
        <div class="card">
            <div class="card-header">
                <span class="card-title"><i class="fas fa-chart-bar"></i> Resumo</span>
                <button class="btn btn-primary" onclick="loadSms()">
                    <i class="fas fa-sync-alt"></i> Actualizar
                </button>
            </div>
            <div class="stats-grid" id="statsGrid">
                <div class="stat-card"><div class="stat-number" id="statTotal">—</div><div class="stat-label">Total SMS</div></div>
                <div class="stat-card"><div class="stat-number" style="color:#10b981" id="statElig">—</div><div class="stat-label">Elegíveis</div></div>
                <div class="stat-card"><div class="stat-number" style="color:#ef4444" id="statInelig">—</div><div class="stat-label">Inelegíveis</div></div>
                <div class="stat-card"><div class="stat-number" style="color:#10b981" id="statApproved">—</div><div class="stat-label">Aprovados</div></div>
            </div>
        </div>

        <!-- Lista de SMS -->
        <div class="card">
            <div class="card-header">
                <span class="card-title"><i class="fas fa-inbox"></i> Mensagens</span>
                <div style="display:flex;gap:8px;">
                    <button class="btn btn-secondary" onclick="exportSms()">
                        <i class="fas fa-download"></i> Exportar
                    </button>
                    <button class="btn btn-danger" onclick="clearSms()">
                        <i class="fas fa-trash"></i> Limpar
                    </button>
                </div>
            </div>

            <div class="filter-bar">
                <input type="text" class="search-input" id="searchInput" placeholder="🔍 Pesquisar por número ou mensagem..." oninput="filterSms()">
                <button class="filter-btn active" data-type="ALL" onclick="setFilter('ALL', this)">Todos</button>
                <button class="filter-btn" data-type="ELIGIBILITY" onclick="setFilter('ELIGIBILITY', this)">Elegíveis</button>
                <button class="filter-btn" data-type="INELIGIBILITY" onclick="setFilter('INELIGIBILITY', this)">Inelegíveis</button>
                <button class="filter-btn" data-type="LOAN_APPROVED" onclick="setFilter('LOAN_APPROVED', this)">Aprovados</button>
                <button class="filter-btn" data-type="LOAN_PROCESSING" onclick="setFilter('LOAN_PROCESSING', this)">Em Processo</button>
            </div>

            <div class="action-bar">
                <span id="countLabel" style="font-size:13px;color:#999;align-self:center;"></span>
            </div>

            <div id="smsList" class="sms-list">
                <div class="loading"><i class="fas fa-spinner"></i> A carregar SMS...</div>
            </div>
        </div>
    </div>

    <script>
        let allSms = [];
        let currentFilter = 'ALL';

        function formatDate(dateStr) {
            if (!dateStr) return '—';
            try {
                const d = new Date(dateStr);
                return d.toLocaleDateString('pt-MZ') + ' ' + d.toLocaleTimeString('pt-MZ', { hour: '2-digit', minute: '2-digit' });
            } catch(e) { return dateStr; }
        }

        function getTypeIcon(type) {
            const icons = {
                ELIGIBILITY: '✅',
                INELIGIBILITY: '❌',
                LOAN_APPROVED: '🎉',
                LOAN_FAILED: '⚠️',
                LOAN_PROCESSING: '⏳',
                DOCUMENT: '📄',
                MANUAL: '✉️',
                REGISTRATION: '📝',
                SMS: '📱'
            };
            return icons[type] || '📱';
        }

        async function loadSms() {
            try {
                const res = await fetch('/api/sms/logs');
                allSms = await res.json();
                allSms = allSms.sort((a, b) => new Date(b.sentAt) - new Date(a.sentAt));
                updateStats();
                renderSms();
            } catch(e) {
                document.getElementById('smsList').innerHTML = `
                    <div class="empty-state">
                        <i class="fas fa-exclamation-circle"></i>
                        <p>Erro ao carregar SMS: ${e.message}</p>
                    </div>`;
            }
        }

        function updateStats() {
            document.getElementById('statTotal').textContent = allSms.length;
            document.getElementById('statElig').textContent = allSms.filter(s => s.type === 'ELIGIBILITY').length;
            document.getElementById('statInelig').textContent = allSms.filter(s => s.type === 'INELIGIBILITY').length;
            document.getElementById('statApproved').textContent = allSms.filter(s => s.type === 'LOAN_APPROVED').length;
        }

        function setFilter(type, btn) {
            currentFilter = type;
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            renderSms();
        }

        function filterSms() {
            renderSms();
        }

        function renderSms() {
            const search = document.getElementById('searchInput').value.toLowerCase();
            let filtered = allSms;

            if (currentFilter !== 'ALL') {
                filtered = filtered.filter(s => s.type === currentFilter);
            }
            if (search) {
                filtered = filtered.filter(s =>
                    (s.msisdn || s.phoneNumber || '').includes(search) ||
                    (s.message || '').toLowerCase().includes(search)
                );
            }

            document.getElementById('countLabel').textContent = `${filtered.length} mensagem(ns)`;

            if (!filtered.length) {
                document.getElementById('smsList').innerHTML = `
                    <div class="empty-state">
                        <i class="fas fa-inbox"></i>
                        <p>Nenhum SMS encontrado.</p>
                    </div>`;
                return;
            }

            document.getElementById('smsList').innerHTML = filtered.map(sms => `
                <div class="sms-item ${sms.type || ''}">
                    <div class="sms-header">
                        <div class="sms-meta">
                            <span class="sms-type-badge ${sms.type || ''}">${getTypeIcon(sms.type)} ${sms.type || 'SMS'}</span>
                            <span class="sms-phone"><i class="fas fa-phone" style="font-size:11px;margin-right:4px;"></i>${sms.msisdn || sms.phoneNumber || '—'}</span>
                        </div>
                        <span class="sms-time"><i class="fas fa-clock" style="font-size:10px;margin-right:3px;"></i>${formatDate(sms.sentAt)}</span>
                    </div>
                    <div class="sms-message">${(sms.message || '').replace(/</g, '&lt;')}</div>
                </div>
            `).join('');
        }

        async function clearSms() {
            if (!confirm('Tem a certeza que quer apagar todos os SMS?')) return;
            try {
                await fetch('/api/sms/logs', { method: 'DELETE' });
                allSms = [];
                updateStats();
                renderSms();
            } catch(e) {
                alert('Erro ao limpar SMS: ' + e.message);
            }
        }

        function exportSms() {
            const data = JSON.stringify(allSms, null, 2);
            const blob = new Blob([data], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `sms-payja-${new Date().toISOString().split('T')[0]}.json`;
            a.click();
        }

        // Carregar ao iniciar e actualizar a cada 10s
        loadSms();
        setInterval(loadSms, 10000);
    </script>
</body>
</html>
